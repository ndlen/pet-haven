<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Pet Haven</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Đặt nền tối cho toàn bộ trang */
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Hộp chứa form đăng ký */
        .register-container {
            background-color: #1f1f1f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(255, 255, 255, 0.15);
            text-align: center;
            width: 400px;
            max-width: 90%;
        }

        /* Căn đều tất cả input và select */
        .input-group {
            width: 100%;
            margin-bottom: 15px;
            text-align: left;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.5);
        }

        /* Nút đăng ký */
        .register-btn {
            width: 100%;
            padding: 12px;
            background-color: #FF8C00;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .register-btn:hover {
            background-color: #e67e00;
        }

        /* Liên kết dưới form */
        .links {
            margin-top: 15px;
        }

        .links a {
            color: #FF8C00;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* Phần con mắt trong input password */
        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            padding-right: 45px;
            /* Chừa khoảng trống cho icon */
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #bbb;
            font-size: 18px;
            transition: 0.3s;
        }

        .toggle-password:hover {
            color: #FF8C00;
        }

        /* Tạo style tùy chỉnh cho select */
        select {
            appearance: none;
            /* Ẩn icon mặc định của trình duyệt */
            -webkit-appearance: none;
            -moz-appearance: none;
            padding-right: 30px;
            /* Để chừa khoảng trống cho icon */
            background-color: #2a2a2a;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%23ffffff'%3E%3Cpath fill-rule='evenodd' d='M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z' clip-rule='evenodd'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            /* Dịch icon sang trái 2px */
            background-size: 16px;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }

        /* Khi select được focus */
        select:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.5);
        }

        /* Chỉnh màu icon lịch trong input date */
        input[type="date"] {
            color: #fff;
            /* Màu chữ trắng */
            background-color: #2a2a2a;
            /* Màu nền tối */
            border: 1px solid #444;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            font-size: 15px;
        }

        /* Chỉnh màu icon lịch */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            /* Đảo màu icon */
            cursor: pointer;
            /* Cho phép click */
        }
    </style>
</head>

<body>
    <div class="register-container">
        <h2>Đăng ký</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="fullname">Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="input-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" placeholder="Nhập số điện thoại" required>
            </div>
            <div class="input-group">
                <label for="dob">Ngày sinh</label>
                <input type="date" id="dob" required style="color: #fff;">
            </div>
            <div class="input-group">
                <label for="gender">Giới tính</label>
                <select id="gender" required>
                    <option value="" disabled selected>Chọn giới tính</option>
                    <option value="male">Nam</option>
                    <option value="female">Nữ</option>
                    <option value="other">Khác</option>
                </select>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('password')"
                        style="font-size: 15px;"></i>
                </div>
            </div>
            <div class="input-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirm-password')"
                        style="font-size: 15px;"></i>
                </div>
            </div>
            <button type="submit" class="register-btn">Đăng ký</button>
            <div class="links">
                <a href="login.html">Đã có tài khoản? Đăng nhập ngay</a>
            </div>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDbS-1FULvtPhOKsQBfLcamsQDUmMyfyOo",
            authDomain: "pet-haven-fb90f.firebaseapp.com",
            projectId: "pet-haven-fb90f",
            storageBucket: "pet-haven-fb90f.appspot.com",
            messagingSenderId: "910697102356",
            appId: "1:910697102356:web:b980f8219ab73019c0fb01"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Xử lý sự kiện khi nhấn nút Đăng ký
        document.getElementById("registerForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const fullname = document.getElementById("fullname").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const dob = document.getElementById("dob").value;
            const gender = document.getElementById("gender").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm-password").value;

            if (password !== confirmPassword) {
                alert("Mật khẩu xác nhận không khớp!");
                return;
            }

            try {

                // KIỂM TRA EMAIL ĐÃ TỒN TẠI TRONG FIRESTORE CHƯA
                const usersRef = db.collection("users");
                const querySnapshot = await usersRef.where("email", "==", email).get();

                if (!querySnapshot.empty) {
                    alert("Email này đã được đăng ký. Vui lòng sử dụng email khác!");
                    return;
                }

                console.log("Bắt đầu ghi dữ liệu vào Firestore...");

                const docRef = await db.collection("users").add({
                    fullname: fullname,
                    email: email,
                    phone: phone,
                    dob: firebase.firestore.Timestamp.fromDate(new Date(dob)),
                    gender: gender,
                    password: password,
                    role: "user",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });


                console.log("Dữ liệu đã lưu, ID:", docRef.id);
                alert("Đăng ký thành công! ID người dùng: " + docRef.id);

                // Reset form sau khi đăng ký thành công
                document.getElementById("registerForm").reset();
            } catch (error) {
                console.error("Lỗi khi lưu dữ liệu:", error);
                alert("Đã xảy ra lỗi khi đăng ký. Vui lòng thử lại!");
            }
        });

        function togglePassword(fieldId) {
            const passwordField = document.getElementById(fieldId);
            if (passwordField.type === "password") {
                passwordField.type = "text"; // Hiển thị mật khẩu
            } else {
                passwordField.type = "password"; // Ẩn mật khẩu
            }
        }
    </script>
</body>

</html>
