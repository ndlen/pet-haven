<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Đặt lịch Chăm sóc Thú cưng</title>
    <link rel="stylesheet" href="../style/nav.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">Hệ Thống Quản Lý</div>
        <ul>
            <li><a href="../appointments/index.html">Lịch Hẹn</a></li>
            <li><a href="../foods/index.html">Thức Ăn</a></li>
            <li><a href="../pets/index.html">Thú Cưng</a></li>
            <li><a href="../services/index.html">Dịch Vụ</a></li>
            <li><a href="../users/index.html">Người Dùng</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>Quản lý Đặt lịch Chăm sóc Thú cưng</h1>
        
        <button id="add-appointment-btn" onclick="toggleForm()">Thêm Đặt Lịch</button>

        <table id="appointment-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User ID</th>
                    <th>Date</th>
                    <th>Service</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be inserted here dynamically -->
            </tbody>
        </table>

        <div id="overlay" onclick="toggleForm()"></div>

        <div id="appointment-form-container">
            <form id="appointment-form">
                <h2 id="form-title">Thêm Đặt Lịch</h2>
                <input type="text" id="userId" placeholder="User ID" required />
                <input type="date" id="date" required />
                <input type="text" id="service" placeholder="Service" required />
                <select id="status">
                    <option value="Chờ xác nhận">Chờ xác nhận</option>
                    <option value="Đã xác nhận">Đã xác nhận</option>
                    <option value="Hoàn thành">Hoàn thành</option>
                    <option value="Đã hủy">Đã hủy</option>
                </select>
                
                <button type="submit">Lưu</button>
                <button type="button" onclick="toggleForm()">Hủy</button>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
