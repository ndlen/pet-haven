<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý Dịch Vụ</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link rel="stylesheet" href="../style/nav.css">

    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-brand">Hệ Thống Quản Lý</div>
        <ul>
            <li><a href="../appointments/index.html">Lịch Hẹn</a></li>
            <li><a href="../foods/index.html">Thức Ăn</a></li>
            <li><a href="../pets/index.html">Thú Cưng</a></li>
            <li><a href="../services/index.html">Dịch Vụ</a></li>
            <li><a href="../users/index.html">Người Dùng</a></li>
        </ul>
    </nav>
    <div class="container">
        <h2>DANH SÁCH DỊCH VỤ</h2>
        <button type="button" class="btn btn-primary" id="showAddForm">THÊM DỊCH VỤ</button>

        <!-- Modal Form -->
        <div id="serviceModal" class="modal">
            <div class="modal-content">
                <h3 id="formTitle">THÊM DỊCH VỤ</h3>
                <form id="serviceForm">
                    <input type="hidden" id="serviceId">
                    <div class="form-group">
                        <label for="serviceName">Tên dịch vụ</label>
                        <input type="text" class="form-control" id="serviceName" required placeholder="Nhập tên dịch vụ">
                    </div>
                    <div class="form-group">
                        <label for="serviceDescription">Mô tả</label>
                        <textarea class="form-control" id="serviceDescription" required placeholder="Nhập mô tả dịch vụ"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="servicePicture">Hình ảnh (URL)</label>
                        <input type="text" class="form-control" id="servicePicture" required placeholder="Nhập URL hình ảnh">
                    </div>
                    <div class="form-group">
                        <label for="servicePrice">Giá (VND)</label>
                        <input type="number" class="form-control" id="servicePrice" required placeholder="Nhập giá dịch vụ">
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-success">Lưu</button>
                        <button type="button" class="btn btn-secondary" id="cancelForm">Hủy</button>
                    </div>
                </form>
            </div>
        </div>

        <table id="table-services" class="table table-bordered">
            <tr>
                <th>Tên dịch vụ</th>
                <th>Mô tả</th>
                <th>Hình ảnh</th>
                <th>Giá</th>
                <th>Hành động</th>
            </tr>
        </table>
    </div>

    <script src="./script.js"></script>

</body>

</html>
