<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Quản Lý SẢN PHẨM Thú Cưng</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>
</head>

<body>
    <div class="container">
        <h2>DANH SÁCH SẢN PHẨM</h2>
        <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#addFoodModal">
            THÊM SẢN PHẨM
        </button>

        <!-- Modal Thêm Sản Phẩm -->
        <div class="modal fade" id="addFoodModal" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">THÊM SẢN PHẨM</h5>
                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="addFoodForm">
                            <div class="form-group">
                                <label>Tên món ăn</label>
                                <input type="text" class="form-control" id="addFoodName" required>
                            </div>
                            <div class="form-group">
                                <label>Giá</label>
                                <input type="number" class="form-control" id="addFoodPrice" required>
                            </div>
                            <div class="form-group">
                                <label>Danh mục</label>
                                <input type="text" class="form-control" id="addFoodCategory" required>
                            </div>
                            <div class="form-group">
                                <label>Trạng thái</label>
                                <select class="form-control" id="addFoodStatus">
                                    <option value="Còn hàng">Còn hàng</option>
                                    <option value="Hết hàng">Hết hàng</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success">Thêm</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Sửa Sản Phẩm -->
        <div class="modal fade" id="editFoodModal" tabindex="-1" role="dialog" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">SỬA SẢN PHẨM</h5>
                        <button type="button" class="close" data-dismiss="modal">&times;</button>
                    </div>
                    <div class="modal-body">
                        <form id="editFoodForm">
                            <input type="hidden" id="editFoodId">
                            <div class="form-group">
                                <label>Tên món ăn</label>
                                <input type="text" class="form-control" id="editFoodName" required>
                            </div>
                            <div class="form-group">
                                <label>Giá</label>
                                <input type="number" class="form-control" id="editFoodPrice" required>
                            </div>
                            <div class="form-group">
                                <label>Danh mục</label>
                                <input type="text" class="form-control" id="editFoodCategory" required>
                            </div>
                            <div class="form-group">
                                <label>Trạng thái</label>
                                <select class="form-control" id="editFoodStatus">
                                    <option value="Còn hàng">Còn hàng</option>
                                    <option value="Hết hàng">Hết hàng</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-warning">Cập nhật</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <table id="table-foods" class="table table-bordered">
            <tr>
                <th>Tên món ăn</th>
                <th>Giá</th>
                <th>Danh mục</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="main.js"></script>
</body>

</html>
