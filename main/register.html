<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Pet Haven</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="./styles/register.css">
</head>

<body>
    <div class="register-container">
        <h2>Đăng ký</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="fullname">Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="input-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" placeholder="Nhập số điện thoại" required>
            </div>
            <div class="input-group">
                <label for="dob">Ngày sinh</label>
                <input type="date" id="dob" required style="color: #fff;">
            </div>
            <div class="input-group">
                <label for="gender">Giới tính</label>
                <select id="gender" required>
                    <option value="" disabled selected>Chọn giới tính</option>
                    <option value="male">Nam</option>
                    <option value="female">Nữ</option>
                    <option value="other">Khác</option>
                </select>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('password')"
                        style="font-size: 15px;"></i>
                </div>
            </div>
            <div class="input-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirm-password')"
                        style="font-size: 15px;"></i>
                </div>
            </div>
            <button type="submit" class="register-btn">Đăng ký</button>
            <div class="links">
                <a href="login.html">Đã có tài khoản? Đăng nhập ngay</a>
            </div>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="./script/register.js"></script>
</body>

</html>
