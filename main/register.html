<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Pet Haven</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="./styles/register.css">
</head>

<body>
    <div class="register-container">
        <h2>Đăng ký</h2>
        <form id="registerForm">
            <div class="input-group">
                <label for="fullname">Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Nhập email của bạn" required>
                <span class="error-message" id="email-error"></span>
                <span class="success-message" id="email-success">Đã xác thực</span>
                <div class="verification-group" id="verification-group">
                    <button type="button" class="verify-btn" id="send-verification">Gửi link xác thực</button>
                </div>
            </div>
            <div class="input-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" placeholder="Nhập số điện thoại" required>
            </div>
            <div class="input-group date-group">
                <div>
                    <label for="day">Ngày</label>
                    <select id="day" required>
                        <option value="" disabled selected>Ngày</option>
                    </select>
                </div>
                <div>
                    <label for="month">Tháng</label>
                    <select id="month" required>
                        <option value="" disabled selected>Tháng</option>
                        <option value="1">Tháng 1</option>
                        <option value="2">Tháng 2</option>
                        <option value="3">Tháng 3</option>
                        <option value="4">Tháng 4</option>
                        <option value="5">Tháng 5</option>
                        <option value="6">Tháng 6</option>
                        <option value="7">Tháng 7</option>
                        <option value="8">Tháng 8</option>
                        <option value="9">Tháng 9</option>
                        <option value="10">Tháng 10</option>
                        <option value="11">Tháng 11</option>
                        <option value="12">Tháng 12</option>
                    </select>
                </div>
                <div>
                    <label for="year">Năm</label>
                    <select id="year" required>
                        <option value="" disabled selected>Năm</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label for="gender">Giới tính</label>
                <select id="gender" required>
                    <option value="" disabled selected>Chọn giới tính</option>
                    <option value="male">Nam</option>
                    <option value="female">Nữ</option>
                    <option value="other">Khác</option>
                </select>
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('password')"
                        style="font-size: 15px;"></i>
                </div>
            </div>
            <div class="input-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirm-password')"
                        style="font-size: 15px;"></i>
                </div>
            </div>
            <button type="submit" class="register-btn">Đăng ký</button>
            <div class="links">
                <a href="login.html">Đã có tài khoản? Đăng nhập ngay</a>
            </div>
        </form>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="./script/register.js"></script>
</body>

</html>
