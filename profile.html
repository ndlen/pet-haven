<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân - Pet Haven</title>

    <!-- FontAwesome để có icon con mắt -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-container {
            background-color: #1f1f1f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(255, 255, 255, 0.15);
            text-align: left;
            width: 400px;
            max-width: 90%;
            margin: 50px auto;
            color: #fff;
        }

        /* Tiêu đề */
        .profile-container h2 {
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.5);
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            padding-right: 40px;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #bbb;
            font-size: 18px;
            transition: 0.3s;
        }

        .toggle-password:hover {
            color: #FF8C00;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background-color: #FF8C00;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .save-btn:hover {
            background-color: #e67e00;
        }

        .date-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .date-group select {
            width: 100%;
        }

        .input-group select,
        .input-group input {
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <h2>Thông tin cá nhân</h2>
        <form id="profileForm">
            <div class="input-group">
                <label for="fullname">Họ và tên</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên" required style="width: 375px;">
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" disabled style="width: 375px;">
            </div>
            <div class="input-group">
                <label for="phone">Số điện thoại</label>
                <input type="tel" id="phone" placeholder="Nhập số điện thoại" style="width: 375px;">
            </div>
            <div class="input-group date-group">
                <div>
                    <label for="day">Ngày</label>
                    <select id="day" required>
                        <option value="" disabled selected>Ngày</option>
                        <script>
                            for (let i = 1; i <= 31; i++) {
                                const option = document.createElement("option");
                                option.value = i;
                                option.textContent = i;
                                document.getElementById("day").appendChild(option);
                            }
                        </script>
                    </select>
                </div>
                <div>
                    <label for="month">Tháng</label>
                    <select id="month" required>
                        <option value="" disabled selected>Tháng</option>
                        <option value="1">Tháng 1</option>
                        <option value="2">Tháng 2</option>
                        <option value="3">Tháng 3</option>
                        <option value="4">Tháng 4</option>
                        <option value="5">Tháng 5</option>
                        <option value="6">Tháng 6</option>
                        <option value="7">Tháng 7</option>
                        <option value="8">Tháng 8</option>
                        <option value="9">Tháng 9</option>
                        <option value="10">Tháng 10</option>
                        <option value="11">Tháng 11</option>
                        <option value="12">Tháng 12</option>
                    </select>
                </div>
                <div>
                    <label for="year">Năm</label>
                    <select id="year" required>
                        <option value="" disabled selected>Năm</option>
                        <script>
                            const currentYear = new Date().getFullYear();
                            for (let i = currentYear; i >= 1900; i--) {
                                const option = document.createElement("option");
                                option.value = i;
                                option.textContent = i;
                                document.getElementById("year").appendChild(option);
                            }
                        </script>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="gender">Giới tính</label>
                <select id="gender">
                    <option value="" disabled selected>Giới tính</option>
                    <option value="male">Nam</option>
                    <option value="female">Nữ</option>
                    <option value="other">Khác</option>
                </select>
            </div>

            <div class="input-group">
                <label for="password">Mật khẩu mới</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Nhập mật khẩu mới" style="width: 345px;">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('password')"></i>
                </div>
            </div>
            <div class="input-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <div class="password-wrapper">
                    <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu mới" style="width: 345px;">
                    <i class="fa-solid fa-eye toggle-password" onclick="togglePassword('confirm-password')"></i>
                </div>
            </div>
            <button type="submit" class="save-btn">Lưu thay đổi</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Cấu hình Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDbS-1FULvtPhOKsQBfLcamsQDUmMyfyOo",
            authDomain: "pet-haven-fb90f.firebaseapp.com",
            projectId: "pet-haven-fb90f",
            storageBucket: "pet-haven-fb90f.appspot.com",
            messagingSenderId: "910697102356",
            appId: "1:910697102356:web:b980f8219ab73019c0fb01"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.addEventListener("DOMContentLoaded", function () {
            const userData = JSON.parse(localStorage.getItem("user"));

            if (userData) {
                document.getElementById("fullname").value = userData.fullname || "";
                document.getElementById("email").value = userData.email || "";
                document.getElementById("phone").value = userData.phone || "";
                document.getElementById("dob").value = userData.dob || "";
                document.getElementById("gender").value = userData.gender || "";
                document.getElementById("password").value = ""; // Mật khẩu không hiển thị
                document.getElementById("confirm-password").value = ""; // Mật khẩu không hiển thị
            }
        });

        document.getElementById("profileForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const updatedUser = {
                fullname: document.getElementById("fullname").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                dob: document.getElementById("dob").value,
                gender: document.getElementById("gender").value,
                password: document.getElementById("password").value
            };

            if (updatedUser.password && updatedUser.password !== document.getElementById("confirm-password").value) {
                alert("Mật khẩu mới và xác nhận mật khẩu không khớp!");
                return;
            }

            // Cập nhật vào localStorage
            localStorage.setItem("user", JSON.stringify(updatedUser));
            alert("Thông tin đã được cập nhật!");
        });

        // Hàm bật/tắt hiển thị mật khẩu
        function togglePassword(fieldId) {
            const passwordField = document.getElementById(fieldId);
            const toggleIcon = passwordField.nextElementSibling;

            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleIcon.classList.remove("fa-eye");
                toggleIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                toggleIcon.classList.remove("fa-eye-slash");
                toggleIcon.classList.add("fa-eye");
            }
        }
    </script>
</body>

</html>
