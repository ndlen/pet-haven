<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Dịch Vụ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Quản lý Dịch Vụ</h1>

        <button id="addServiceBtn">➕ Thêm Dịch Vụ</button>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên Dịch Vụ</th>
                    <th>Mô Tả</th>
                    <th>Giá</th>
                    <th>Hình Ảnh</th>
                    <th>Hành Động</th>
                </tr>
            </thead>
            <tbody id="serviceList">
                <!-- Dịch vụ sẽ được thêm vào đây -->
            </tbody>
        </table>
    </div>

    <!-- Form thêm dịch vụ -->
    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Nhập thông tin dịch vụ</h2>
            <input type="text" id="serviceId" placeholder="ID Dịch Vụ">
            <input type="text" id="serviceName" placeholder="Tên Dịch Vụ">
            <input type="text" id="serviceDesc" placeholder="Mô Tả">
            <input type="number" id="servicePrice" placeholder="Giá">
            <input type="text" id="servicePicture" placeholder="Link Hình Ảnh">
            <button id="saveService">Lưu</button>
        </div>
    </div>
